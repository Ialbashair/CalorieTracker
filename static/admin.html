<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri - Admin</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="top-header">
            <div class="brand-row">
                <img src="/static/favicon.ico" alt="Nutri logo" class="brand-logo">
                <h1>Nutri</h1>
            </div>

            <nav class="page-tabs">
                <a href="/home" class="tab-link">Home</a>
                <a href="/tracker" class="tab-link">Tracker</a>
                <a href="/stats" class="tab-link">Stats</a>
                <a href="/feed" class="tab-link">Social Feed</a>
                <a href="/admin" class="tab-link active-tab admin-tab" id="admin-tab">Admin</a>
            </nav>

            <div id="user-bar" class="user-bar"></div>
        </header>

        <section class="section">
            <div class="section-header">
                <h2>User Management</h2>
            </div>

            <input
                type="text"
                id="admin-user-search"
                placeholder="Search by username or email"
                oninput="filterAdminUsers()"
            >

            <p id="admin-empty" class="empty-label">No users found.</p>
            <ul id="admin-user-list"></ul>
        </section>

        <section class="section">
            <div class="section-header">
                <div>
                    <h2>Database Management</h2>
                    <p class="section-subtext">Add foods and exercises users can track.</p>
                </div>
            </div>

            <div class="admin-management-grid">
                <div class="settings-card">
                    <h3>Add Food</h3>

                    <input
                        type="text"
                        id="admin-food-name"
                        placeholder="Food name, e.g. banana"
                    >

                    <input
                        type="number"
                        id="admin-food-calories"
                        placeholder="Calories"
                        min="1"
                    >

                    <input
                        type="number"
                        id="admin-food-serving-size-g"
                        placeholder="Serving size in grams"
                        min="1"
                        value="100"
                    >

                    <button class="save-btn" onclick="adminAddFood()">Add Food</button>
                    <p id="admin-food-message" class="auth-message"></p>
                </div>

                <div class="settings-card">
                    <h3>Add Exercise</h3>

                    <input
                        type="text"
                        id="admin-exercise-name"
                        placeholder="Exercise name, e.g. Jump Rope"
                    >

                    <input
                        type="number"
                        id="admin-exercise-calories"
                        placeholder="Calories burned per hour"
                        min="1"
                    >

                    <button class="save-btn" onclick="adminAddExercise()">Add Exercise</button>
                    <p id="admin-exercise-message" class="auth-message"></p>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
