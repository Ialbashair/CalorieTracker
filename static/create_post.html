<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri - Create Post</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container feed-container">
        <header class="top-header">
            <div class="brand-row">
                <img src="/static/favicon.ico" alt="Nutri logo" class="brand-logo">
                <h1>Nutri</h1>
            </div>

            <nav class="page-tabs">
                <a href="/tracker" class="tab-link">Tracker</a>
                <a href="/stats" class="tab-link">Stats</a>
                <a href="/feed" class="tab-link active-tab">Social Feed</a>
                <a href="/admin" class="tab-link admin-tab" id="admin-tab" style="display: none;">Admin</a>
            </nav>

            <div id="user-bar" class="user-bar"></div>

            <nav class="sub-tabs">
                <a href="/feed" class="sub-tab-link">Feed</a>
                <a href="/feed/create" class="sub-tab-link active-sub-tab">Create New Post +</a>
                <a href="/feed/profile" class="sub-tab-link">Profile</a>
            </nav>
        </header>

        <section class="section">
            <div class="section-header">
                <h2>Create New Post</h2>
            </div>

            <div class="post-create-card">
                <div class="post-create-user">
                    <strong id="create-post-username">Username</strong>
                </div>

                <input type="file" id="post-images" accept="image/*" multiple>
                <p class="helper-text">Upload between 1 and 5 images.</p>

                <div id="post-image-preview" class="post-image-preview"></div>

                <textarea id="post-caption" placeholder="Write a caption..."></textarea>

                <p id="create-post-message" class="auth-message"></p>

                <div class="modal-actions">
                    <button class="save-btn" onclick="submitPost()">Post</button>
                    <button class="cancel-btn" onclick="window.location.href='/feed'">Cancel</button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
