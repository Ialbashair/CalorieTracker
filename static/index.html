<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri - Tracker</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/script.js" defer></script>
</head>

<body>
    <div class="container">
        <header class="top-header">
            <div class="brand-row">
                <img src="/static/favicon.ico" alt="Nutri logo" class="brand-logo">
                <h1>Nutri</h1>
            </div>

            <nav class="page-tabs">
                <a href="/tracker" class="tab-link active-tab">Tracker</a>
                <a href="/stats" class="tab-link">Stats</a>
                <a href="/feed" class="tab-link">Social Feed</a>
                <a href="/admin" class="tab-link admin-tab" id="admin-tab" style="display: none;">Admin</a>
            </nav>

            <div id="user-bar" class="user-bar"></div>
        </header>

        <div class="summary-card">
            <h2>Total: <span id="total-calories">0</span> kcal</h2>
        </div>

        <section class="section">
            <div class="section-header">
                <h2>Foods</h2>
                <button class="add-section-btn" onclick="openAddFoodModal()">+ Add Food</button>
            </div>
            <p id="food-empty" class="empty-label">No foods logged yet. Add a food to get started!</p>
            <ul id="calorie-list"></ul>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>Exercises</h2>
                <button class="add-section-btn exercise-btn" onclick="openAddExerciseModal()">+ Add Exercise</button>
            </div>
            <p id="exercise-empty" class="empty-label">No exercises logged yet. Add an exercise to get started!</p>
            <ul id="exercise-list"></ul>
        </section>
    </div>

    <!-- Add Food Modal -->
    <div id="add-food-modal" class="modal">
        <div class="modal-content">
            <h3>Add Food</h3>
            <p id="food-error" style="color: #ef4444; display: none; font-size: 0.8rem; margin-bottom: 10px;"></p>
            <div class="search-wrapper">
                <input type="text" id="food-search" placeholder="Search foods..." autocomplete="off">
                <ul id="food-results" class="search-dropdown"></ul>
            </div>
            <input type="text" inputmode="decimal" id="food-grams" placeholder="Grams" oninput="limitDecimals(this, 2)">
            <div class="modal-actions">
                <button onclick="addFoodEntry()" class="save-btn">Add</button>
                <button onclick="closeAddFoodModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Add Exercise Modal -->
    <div id="add-exercise-modal" class="modal">
        <div class="modal-content">
            <h3>Add Exercise</h3>
            <p id="exercise-error" style="color: #ef4444; display: none; font-size: 0.8rem; margin-bottom: 10px;"></p>
            <div class="search-wrapper">
                <input type="text" id="exercise-search" placeholder="Search exercises..." autocomplete="off">
                <ul id="exercise-results" class="search-dropdown"></ul>
            </div>
            <input type="text" inputmode="decimal" id="exercise-hours" placeholder="Hours" oninput="limitDecimals(this, 2)">
            <div class="modal-actions">
                <button onclick="addExerciseEntry()" class="save-btn">Add</button>
                <button onclick="closeAddExerciseModal()" class="cancel-btn">Cancel</button>
            </div>
        </div>
    </div>
</body>
</html>
