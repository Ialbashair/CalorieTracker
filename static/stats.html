<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri - Stats</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/style.css">
    <script src='https://cdn.plot.ly/plotly-3.4.0.min.js'></script>
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="container">
        <header class="top-header">
            <div class="brand-row">
                <img src="/static/favicon.ico" alt="Nutri logo" class="brand-logo">
                <h1>Nutri</h1>
            </div>

            <nav class="page-tabs">
                <a href="/home" class="tab-link">Home</a>
                <a href="/tracker" class="tab-link">Tracker</a>
                <a href="/stats" class="tab-link active-tab">Stats</a>
                <a href="/feed" class="tab-link">Social Feed</a>
                <a href="/admin" class="tab-link admin-tab" id="admin-tab" style="display: none;">Admin</a>
            </nav>

            <div id="user-bar" class="user-bar"></div>
        </header>

        <section class="section">
            <div class="section-header">
                <div>
                    <h2>Stats & Visualizations</h2>
                    <p class="section-subtext">Review your progress, generate recaps, and view charts.</p>
                </div>
            </div>

            <nav class="stats-tabs">
                <button type="button" class="stats-tab active-stats-tab" onclick="showStatsTab('statistics')">
                    Statistics
                </button>
                <button type="button" class="stats-tab" onclick="showStatsTab('visualizations')">
                    Visualizations
                </button>
            </nav>
        </section>

        <div id="statistics-tab" class="stats-tab-content">
            <section class="section">
                <div class="section-header">
                    <div>
                        <h2>Weekly Recap</h2>
                        <p class="section-subtext">Generate a shareable summary of your last 7 days.</p>
                    </div>
                </div>

                <div class="weekly-recap-card">
                    <canvas id="weekly-recap-canvas" width="1080" height="1080"></canvas>

                    <div class="modal-actions">
                        <button class="save-btn" onclick="loadWeeklyRecap()">Refresh Recap</button>
                        <button class="add-section-btn" onclick="shareWeeklyRecap()">Share to Feed</button>
                        <button class="save-btn" onclick="downloadWeeklyRecap()">Download Recap</button>
                    </div>

                    <p id="weekly-recap-message" class="auth-message"></p>
                </div>
            </section>
        </div>

        <div id="visualizations-tab" class="stats-tab-content" style="display: none;">
            <section class="section">
                <div class="section-header">
                    <div>
                        <h2>Visualizations</h2>
                        <p class="section-subtext">Charts and deeper progress tracking can go here.</p>
                    </div>
                </div>

                <div class="visualization-placeholder">
                    <div id="graph-container"></div>
                </div>
            </section>
        </div>
    </div>
</body>
</html>
